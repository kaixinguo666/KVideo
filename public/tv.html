<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="referrer" content="no-referrer">
    <title>我的专属 TVBox</title>
    <style>
        /* 兼容老电视的 CSS，不使用任何现代变量和高级 Flex */
        body { 
            background-color: #1a1a2e; /* TVBox 经典的深色背景 */
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* 隐藏滚动条，用 JS 控制滚动 */
        }

        /* 顶部标题栏 */
        .header {
            height: 70px;
            background-color: #16213e;
            padding: 0 40px;
            line-height: 70px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        .time { float: right; font-size: 20px; color: #aaaaaa; }

        /* 左侧分类导航 */
        .sidebar {
            position: absolute;
            left: 0;
            top: 70px;
            bottom: 0;
            width: 200px;
            background-color: #0f3460;
            padding-top: 20px;
        }
        .nav-item {
            display: block;
            padding: 15px 30px;
            font-size: 22px;
            color: #cccccc;
            text-decoration: none;
            border-left: 6px solid transparent;
            margin-bottom: 10px;
        }
        /* 遥控器选中左侧导航时的状态 */
        .nav-item.focused {
            background-color: #e94560;
            color: white;
            border-left-color: #ffffff;
            font-weight: bold;
        }

        /* 右侧海报墙区域 */
        .main-content {
            position: absolute;
            left: 200px;
            top: 70px;
            right: 0;
            bottom: 0;
            padding: 30px;
            overflow: hidden;
        }

        /* 影片网格布局 (兼容老浏览器的 inline-block) */
        .grid-container {
            width: 100%;
            position: relative;
            transition: transform 0.3s ease; /* 页面上下平滑滚动 */
        }
        .vod-card {
            display: inline-block;
            width: 17%;
            margin: 0 1.5% 30px 1.5%;
            vertical-align: top;
            text-align: center;
            border: 4px solid transparent;
            border-radius: 8px;
            padding: 5px;
            box-sizing: border-box;
            background-color: #16213e;
        }
        .vod-pic {
            width: 100%;
            height: 220px; /* 海报高度 */
            background-color: #333;
            border-radius: 4px;
            object-fit: cover; /* 保证图片不变形 */
        }
        .vod-name {
            margin-top: 10px;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .vod-remarks {
            font-size: 14px;
            color: #e94560;
            margin-top: 5px;
        }

        /* 遥控器选中影片时的状态（核心！） */
        .vod-card.focused {
            border-color: #e94560;
            background-color: #ffffff;
            color: #000000;
            transform: scale(1.05); /* 微微放大 */
            -webkit-transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.5);
            z-index: 2;
            position: relative;
        }
        .vod-card.focused .vod-remarks { color: #d62828; }

        /* 全屏加载提示 */
        #loading {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); color: white;
            font-size: 30px; line-height: 100vh; text-align: center;
            z-index: 100; display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        KVideo Max <span style="font-size: 16px; color: #e94560; margin-left: 10px;">TVBox 专版</span>
        <div class="time" id="clock">00:00</div>
    </div>

    <div class="sidebar" id="sidebar">
        <!-- 以后这里可以做分类切换，目前暂时只展示首页数据 -->
        <div class="nav-item focusable" data-type="nav" data-index="0">最新推荐</div>
        <div class="nav-item focusable" data-type="nav" data-index="1">动作片</div>
        <div class="nav-item focusable" data-type="nav" data-index="2">连续剧</div>
    </div>

    <div class="main-content">
        <div class="grid-container" id="vod-grid">
            <!-- 影片海报会在这里生成 -->
        </div>
    </div>

    <div id="loading">正在连接影视数据库...</div>

    <script>
        // --- 1. 时钟功能 ---
        function updateTime() {
            var now = new Date();
            var h = now.getHours(); var m = now.getMinutes();
            document.getElementById('clock').innerHTML = (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 2. 模拟兜底数据 ---
        var mockData = [
            {
                vod_name: "网络请求失败",
                vod_pic: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Big_buck_bunny_poster_big.jpg/640px-Big_buck_bunny_poster_big.jpg",
                vod_remarks: "兜底测试",
                play_url: "http://clips.vorwaerts-gmbh.de/big_buck_bunny.mp4" 
            }
        ];
        for (var i = 1; i < 20; i++) {
            mockData.push({
                vod_name: "请检查网络 " + (i + 1),
                vod_pic: "https://img.jisuimage.com/cover/ef90aa6701fdb448885aef70d22b8476.jpg", 
                vod_remarks: "获取失败",
                play_url: ""
            });
        }

        // --- 3. 渲染影片网格 ---
        var grid = document.getElementById('vod-grid');
        var columns = 5; 

        function renderGrid(data) {
            grid.innerHTML = '';
            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                var card = document.createElement('div');
                card.className = 'vod-card focusable';
                card.setAttribute('data-type', 'vod');
                card.setAttribute('data-index', i);
                card.setAttribute('data-url', item.play_url);
                card.setAttribute('data-title', item.vod_name);

                var img = document.createElement('img');
                img.className = 'vod-pic';
                img.src = item.vod_pic;
                img.onerror = function() { this.style.display = 'none'; };

                var name = document.createElement('div');
                name.className = 'vod-name';
                name.innerHTML = item.vod_name;

                var remarks = document.createElement('div');
                remarks.className = 'vod-remarks';
                remarks.innerHTML = item.vod_remarks;

                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(remarks);
                grid.appendChild(card);
            }
            initSpatialNavigation();
        }

        // --- 4. 遥控器十字键焦点管理引擎 ---
        var currentFocusArea = 'nav'; 
        var currentNavIndex = 0;      
        var currentVodIndex = 0;      
        var navItems = [];
        var vodItems = [];

        function initSpatialNavigation() {
            navItems = document.querySelectorAll('.nav-item');
            vodItems = document.querySelectorAll('.vod-card');
            updateFocus();
        }

        function updateFocus() {
            for (var i = 0; i < navItems.length; i++) navItems[i].className = 'nav-item focusable';
            for (var j = 0; j < vodItems.length; j++) vodItems[j].className = 'vod-card focusable';

            if (currentFocusArea === 'nav') {
                navItems[currentNavIndex].className = 'nav-item focusable focused';
                grid.style.transform = 'translateY(0px)'; 
            } else if (currentFocusArea === 'vod' && vodItems.length > 0) {
                var targetVod = vodItems[currentVodIndex];
                targetVod.className = 'vod-card focusable focused';
                
                var row = Math.floor(currentVodIndex / columns);
                if (row > 1) {
                    var scrollY = (row - 1) * 320; 
                    grid.style.transform = 'translateY(-' + scrollY + 'px)';
                    grid.style.webkitTransform = 'translateY(-' + scrollY + 'px)';
                } else {
                    grid.style.transform = 'translateY(0px)';
                    grid.style.webkitTransform = 'translateY(0px)';
                }
            }
        }

        document.onkeydown = function(e) {
            var key = e.keyCode || e.which;
            
            if (currentFocusArea === 'nav') {
                if (key === 40 && currentNavIndex < navItems.length - 1) currentNavIndex++; 
                else if (key === 38 && currentNavIndex > 0) currentNavIndex--; 
                else if (key === 39) { 
                    currentFocusArea = 'vod';
                    currentVodIndex = Math.floor(currentVodIndex / columns) * columns;
                }
            } 
            else if (currentFocusArea === 'vod') {
                if (key === 37) { 
                    if (currentVodIndex % columns === 0) {
                        currentFocusArea = 'nav'; 
                    } else {
                        currentVodIndex--;
                    }
                }
                else if (key === 39 && currentVodIndex < vodItems.length - 1) { 
                    currentVodIndex++;
                }
                else if (key === 40 && currentVodIndex + columns < vodItems.length) { 
                    currentVodIndex += columns;
                }
                else if (key === 38) { 
                    if (currentVodIndex >= columns) currentVodIndex -= columns;
                }
                else if (key === 13) { 
                    var url = vodItems[currentVodIndex].getAttribute('data-url');
                    var title = vodItems[currentVodIndex].getAttribute('data-title');
                    playVideo(url, title);
                }
            }
            updateFocus();
        };

        // --- 5. 呼叫安卓底层播放视频 ---
        function playVideo(url, title) {
            if (!url) {
                alert("无有效链接");
                return;
            }
            if (window.AndroidApp) {
                window.AndroidApp.playVideo(url);
            } else {
                alert("测试环境呼叫：\n" + title + "\n" + url);
            }
        }

        // --- 6. 动态获取真实数据 (万能代理引擎版) ---
        function loadRealData() {
            var loadingDiv = document.getElementById('loading');
            
            // 【究极黑科技：跨域代理】
            // 通过 allorigins 和 corsproxy 代理服务器中转请求
            // 完美避开电脑浏览器的 CORS 跨域拦截，以及老电视的 SSL 证书错误！
            var apiNodes = [
                "https://api.allorigins.win/raw?url=" + encodeURIComponent("http://cj.ffzyapi.com/api.php/provide/vod/at/json"),
                "https://corsproxy.io/?" + encodeURIComponent("http://cj.lxgcj.com/api.php/provide/vod/at/json"),
                "https://api.allorigins.win/raw?url=" + encodeURIComponent("http://www.hongniuzy2.com/api.php/provide/vod/at/json")
            ];
            
            var currentNodeIndex = 0;

            function tryNextNode() {
                if (currentNodeIndex >= apiNodes.length) {
                    loadingDiv.innerHTML = "所有影视节点连接失败，已载入测试数据。";
                    setTimeout(function() {
                        loadingDiv.style.display = 'none';
                        renderGrid(mockData);
                    }, 2000);
                    return;
                }

                var apiUrl = apiNodes[currentNodeIndex];
                loadingDiv.style.display = 'block'; 
                loadingDiv.innerHTML = "正在通过代理引擎连接影视节点 " + (currentNodeIndex + 1) + "...";

                var xhr = new XMLHttpRequest();
                xhr.open("GET", apiUrl, true);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var response = JSON.parse(xhr.responseText);
                                var list = response.list || response.data || []; 
                                
                                if(list.length > 0) {
                                    var formattedData = [];
                                    for (var i = 0; i < list.length; i++) {
                                        var rawPlayUrl = list[i].vod_play_url || "";
                                        var finalPlayUrl = "";
                                        var episodes = rawPlayUrl.split('#');
                                        if (episodes.length > 0) {
                                            var parts = episodes[0].split('$');
                                            finalPlayUrl = parts.length > 1 ? parts[1] : parts[0];
                                        }

                                        formattedData.push({
                                            vod_name: list[i].vod_name || "未知",
                                            vod_pic: list[i].vod_pic || "",
                                            vod_remarks: list[i].vod_remarks || "更新中",
                                            play_url: finalPlayUrl 
                                        });
                                    }
                                    
                                    loadingDiv.style.display = 'none';
                                    renderGrid(formattedData);
                                    return; // 成功获取，结束轮询
                                } else {
                                    throw new Error("接口返回数据为空");
                                }
                            } catch (e) {
                                currentNodeIndex++;
                                tryNextNode();
                            }
                        } else {
                            currentNodeIndex++;
                            tryNextNode();
                        }
                    }
                };
                
                xhr.onerror = function() {
                    currentNodeIndex++;
                    tryNextNode();
                };
                
                xhr.send();
            }

            // 启动节点测试
            tryNextNode();
        }

        // --- 启动 APP ---
        loadRealData();
        
    </script>
</body>
</html>
