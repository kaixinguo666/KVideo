<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>KVideo TV版</title>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; padding: 30px; }
        
        .video-btn { 
            background-color: #333333; 
            color: white; 
            padding: 15px 30px; 
            margin: 10px; 
            font-size: 24px; 
            border: 4px solid transparent; 
            border-radius: 8px;
            cursor: pointer;
        }
        /* 电视遥控器选中时的焦点状态（变红框，非常重要） */
        .video-btn:focus { 
            border-color: #ff0000; 
            background-color: #555555; 
            outline: none; 
        }
        
        #player-container { margin-top: 30px; width: 100%; max-width: 1000px; display: none; }
        #player { width: 100%; background-color: #111; }
        #now-playing { font-size: 20px; color: #00ff00; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>KVideo 电视版 - 终极测试</h1>
    
    <div id="list"></div>

    <div id="player-container">
        <div id="now-playing">准备播放...</div>
        <video id="player" controls autoplay></video>
    </div>

    <script>
        var listDiv = document.getElementById("list");
        var playerContainer = document.getElementById("player-container");
        var player = document.getElementById("player");
        var nowPlaying = document.getElementById("now-playing");

        // 我们直接把你刚刚抓到的真实数据写进来测试！
        var testData = [
            {
                title: "寻秦记 (直接播放测试)",
                // 这就是你刚才抓出来的金钥匙！
                url: "https://vv.jisuzyv.com/play/dNkxrV8e/index.m3u8" 
            }
        ];

        // 渲染测试按钮
        for (var i = 0; i < testData.length; i++) {
            var btn = document.createElement("button");
            btn.className = "video-btn";
            btn.innerHTML = testData[i].title;
            
            (function(videoUrl, videoTitle) {
                btn.onclick = function() {
                    playerContainer.style.display = "block";
                    nowPlaying.innerHTML = "当前正在播放：" + videoTitle;
                    
                    // 老电视的核心神技：直接把 m3u8 喂给 src
                    player.src = videoUrl; 
                    player.play();
                };
            })(testData[i].url, testData[i].title);

            listDiv.appendChild(btn);
        }

        // 自动让按钮获取焦点，你的遥控器一按“确认”就能播！
        setTimeout(function() {
            var firstBtn = document.getElementsByClassName("video-btn")[0];
            if (firstBtn) {
                firstBtn.focus();
            }
        }, 500);
    </script>
</body>
</html>
